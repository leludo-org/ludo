<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8"/>
    <meta name="theme-color" content="#EFE9DC"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <script type="module" src="components/index.bf0b1971.js"></script>
    <script type="module" src="scripts/index.e8f102de.js"></script>
    <link rel="stylesheet" href="output.css"/>

    <link rel="manifest" href="manifest.json"/>

    <link rel="icon" href="assets/icons/favicon.svg" sizes="any" type="image/svg+xml"/>
    <title>Leludo</title>
</head>

<body class="h-full flex flex-col">

<div id="root" class="flex-1 flex items-center justify-center p-2">

    <div id="game-container" class="w-full max-w-96">
        <wc-quick-start id="main-menu" class=""></wc-quick-start>

        <wc-board id="game" class="hidden"></wc-board>
    </div>

</div>

<div id="pause-menu" class="fixed inset-0 z-50 hidden items-center justify-center p-4"
     style="background:hsl(var(--background)/0.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);">
    <div id="pm-card" class="w-full max-w-96 bg-card rounded-3xl border border-foreground/10 p-6 flex flex-col"
         style="box-shadow:0 30px 70px -10px rgba(31,27,20,0.4);">
        <div class="flex items-center gap-2 pb-5">
            <div class="w-[38px] h-[38px] rounded-full bg-foreground/5 border border-foreground/10 flex items-center justify-center">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </div>
            <div class="flex-1 text-[11px] font-medium tracking-[0.16em] uppercase opacity-50">Paused</div>
            <div id="pm-turn-count" class="text-[11px] font-medium tracking-[0.16em] uppercase opacity-50">Turn 0</div>
        </div>

        <h2 class="font-display text-[44px] leading-[0.9] tracking-tight pb-5">
            Take a<br>breather.
        </h2>

        <div id="pm-scoreboard" class="bg-background/40 rounded-2xl px-4 mb-5 border border-foreground/5"></div>

        <div class="flex flex-col gap-2.5">
            <button id="pm-resume" class="w-full h-[56px] rounded-2xl bg-foreground text-background font-medium text-[16px] tracking-wide border-none cursor-pointer flex items-center justify-center gap-2 hover:opacity-90 transition-opacity"
                    style="box-shadow: 0 8px 22px -8px rgba(31,27,20,0.4);">
                Resume
            </button>
            <button class="restart-game w-full h-[48px] rounded-2xl bg-transparent text-foreground font-medium text-[14px] border border-foreground/15 cursor-pointer hover:bg-foreground/5 transition-colors opacity-80">
                Exit to menu
            </button>
        </div>
    </div>
</div>

</body>

</html>
