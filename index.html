<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8"/>
    <meta name="theme-color" content="#EFE9DC"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <script type="module" src="components/index.js"></script>
    <script type="module" src="scripts/index.js"></script>
    <link rel="stylesheet" href="output.css"/>

    <link rel="manifest" href="manifest.json"/>

    <script>
        if ('serviceWorker' in navigator
            && location.hostname !== 'localhost'
            && location.hostname !== '127.0.0.1') {
            window.addEventListener('load', () =>
                navigator.serviceWorker.register('./sw.js', { type: 'module' })
            );
        }
    </script>

    <link rel="icon" href="assets/icons/favicon.svg" sizes="any" type="image/svg+xml"/>
    <title>Leludo</title>
</head>

<body class="h-full flex flex-col">

<div id="root" class="flex-1 flex items-start justify-center p-2">

    <div id="game-container" class="w-full max-w-96">
        <wc-quick-start id="main-menu" class=""></wc-quick-start>

        <wc-board id="game" class="hidden"></wc-board>
    </div>

</div>

<div id="pause-menu" class="fixed inset-0 z-50 bg-background overflow-y-auto hidden items-start justify-center p-2">
    <div class="max-w-96 w-full flex flex-col min-h-[calc(100dvh-16px)]">
        <div class="flex items-center gap-2 pt-1 pb-6">
            <div class="w-[38px]"></div>
            <div class="flex-1 text-center text-[11px] font-medium tracking-[0.16em] uppercase opacity-50">Paused</div>
            <div class="w-[38px]"></div>
        </div>

        <div class="flex-1 flex flex-col justify-center">
            <h2 class="font-display text-[40px] leading-none tracking-tight px-1 pt-2 pb-2">
                Take a<br>breather.
            </h2>
            <p class="text-sm opacity-50 px-1 pt-2 pb-4 max-w-[320px]">The board's right where you left it. Resume when you're ready, or bow out to the menu.</p>

            <div class="px-0 pt-4 pb-4 flex flex-col gap-6">
                <div>
                    <div class="flex items-baseline justify-between mb-2">
                        <div class="text-[11px] tracking-widest uppercase opacity-40">Standings</div>
                        <div id="pm-turn-count" class="text-[11px] tracking-widest uppercase opacity-40">Turn 0</div>
                    </div>
                    <div id="pm-scoreboard" class="bg-card rounded-2xl px-3.5 border border-foreground/10"></div>
                </div>
            </div>
        </div>

        <div class="pt-4 pb-2 flex flex-col gap-2.5">
            <button id="pm-resume" class="w-full h-[60px] rounded-2xl bg-foreground text-background font-medium text-[17px] tracking-wide border-none cursor-pointer flex items-center justify-center gap-2.5 hover:opacity-90 transition-opacity">
                Resume
            </button>
            <button class="restart-game w-full h-[48px] rounded-2xl bg-transparent text-foreground font-medium text-[14px] border border-foreground/15 cursor-pointer hover:bg-foreground/5 transition-colors opacity-80">
                Exit to menu
            </button>
        </div>
    </div>
</div>

</body>

</html>
